name: konflate

# Rendered Flux diff review via the in-cluster konflate instance
# (capi-mgmt/infrastructure/konflate/). For each PR this workflow:
#
#   1. pings konflate's push endpoint so the PR re-renders immediately
#      (instead of waiting for the periodic refresh interval), then
#   2. pulls the rendered summary (blast radius, image changes, cautions,
#      render failures) and posts it as a PR comment — one comment, edited
#      in place on every push, and
#   3. fails the job if the render itself failed, so a PR that breaks the
#      Flux render can't merge unnoticed.
#
# Configuration (skipped gracefully when absent, e.g. before the instance is
# exposed, or on fork PRs where secrets are unavailable):
#   vars.KONFLATE_URL            konflate's externally reachable base URL
#   secrets.KONFLATE_PUSH_TOKEN  same value as KONFLATE_PUSH_TOKEN in
#                                konflate-token.sops.yaml (optional — without
#                                it the summary is still fetched; konflate
#                                just re-renders on its own schedule)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Rendered Flux diff
    # Fork PRs get no secrets and a read-only GITHUB_TOKEN — and konflate
    # doesn't render forks by default anyway (KONFLATE_RENDER_FORK_PRS).
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      KONFLATE_URL: ${{ vars.KONFLATE_URL }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Trigger an immediate re-render
        if: env.KONFLATE_URL != ''
        env:
          KONFLATE_PUSH_TOKEN: ${{ secrets.KONFLATE_PUSH_TOKEN }}
        run: |
          if [ -z "$KONFLATE_PUSH_TOKEN" ]; then
            echo "KONFLATE_PUSH_TOKEN not set — konflate will pick the push up on its own refresh interval."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${KONFLATE_PUSH_TOKEN}" \
            "${KONFLATE_URL}/api/prs/${PR_NUMBER}/refresh"

      - name: Fetch the rendered summary and gate on the render status
        if: env.KONFLATE_URL != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # The summary endpoint answers 503 + Retry-After while the render is
          # in flight, so --retry waits it out. The same response carries the
          # render verdict in the X-Konflate-Render-Status header.
          status=$(curl -fsS --retry 30 --retry-delay 10 -H 'Accept: text/markdown' \
            -o body.md -w '%header{x-konflate-render-status}' \
            "${KONFLATE_URL}/api/prs/${PR_NUMBER}/summary")

          # Always post what rendered — one comment, edited in place.
          gh pr comment "${PR_NUMBER}" --body-file body.md --edit-last --create-if-none

          case "$status" in
            ok)       echo "konflate render: ok" ;;
            failures) echo "::error::konflate render: some resources failed to render"; exit 1 ;;
            *)        echo "::error::konflate render: ${status}"; exit 1 ;;
          esac

      - name: Skip (konflate not configured)
        if: env.KONFLATE_URL == ''
        run: echo "vars.KONFLATE_URL is not set — skipping the konflate review."
