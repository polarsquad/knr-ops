---
# ══════════════════════════════════════════════════════════════════════════════
# Per-cluster read-only IAM role, reconciled by the ACK IAM controller running
# on this workload cluster. IAM is a global service, so the cluster name is
# part of the role name to keep the two clusters from fighting over one role.
#
# Trust policy: the account root — any principal in the account that is itself
# allowed to call sts:AssumeRole on this role can assume it.
#
# Permissions are read-only, scoped to the resources this repo creates on BOTH
# clusters (knr-ops-* S3 buckets and RDS instances): only RDS Describe actions
# that support resource-level scoping are used — no blanket rds:Describe* on *.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: reader
  namespace: default
spec:
  name: knr-ops-${CLUSTER_NAME}-reader
  description: "Read-only access to knr-ops S3 buckets and RDS instances"
  assumeRolePolicyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": { "AWS": "arn:aws:iam::${AWS_ACCOUNT_ID}:root" },
          "Action": "sts:AssumeRole"
        }
      ]
    }
  inlinePolicies:
    knr-ops-read-only: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "ReadKnrOpsBuckets",
            "Effect": "Allow",
            "Action": [
              "s3:ListBucket",
              "s3:GetBucket*",
              "s3:GetObject",
              "s3:GetObjectVersion",
              "s3:GetEncryptionConfiguration",
              "s3:GetLifecycleConfiguration"
            ],
            "Resource": [
              "arn:aws:s3:::knr-ops-*",
              "arn:aws:s3:::knr-ops-*/*"
            ]
          },
          {
            "Sid": "ReadKnrOpsInstances",
            "Effect": "Allow",
            "Action": [
              "rds:DescribeDBInstances",
              "rds:ListTagsForResource"
            ],
            "Resource": "arn:aws:rds:*:${AWS_ACCOUNT_ID}:db:knr-ops-*"
          }
        ]
      }
  tags:
    - key: managed-by
      value: flux-ack
    - key: cluster
      value: ${CLUSTER_NAME}
