---
# ══════════════════════════════════════════════════════════════════════════════
# Flux Kustomization: IAM roles managed by the ACK IAM operator.
#
# dependsOn: aws-operators — the Role CRD and the ACK IAM controller must be
# Ready (aws-operators has wait: true) before Role CRs are applied.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: iam-roles
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/base/iam-roles
  dependsOn:
    - name: aws-operators
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
