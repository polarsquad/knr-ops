---
# ══════════════════════════════════════════════════════════════════════════════
# ACK S3 controller – https://aws-controllers-k8s.github.io/docs/api-reference/#s3
#
# Chart is published as an OCI artifact in the public ECR gallery.
#
# Authentication: EKS Pod Identity — no static credentials on this cluster.
# The management cluster declaratively creates the IAM role and the
# PodIdentityAssociation (see capi-mgmt/infrastructure/ack-pod-identity/),
# and the eks-pod-identity-agent EKS addon (enabled in the CAPI cluster spec)
# injects credentials into the controller pod at runtime.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ack-s3-chart
  namespace: ack-system
spec:
  interval: 1h
  url: oci://public.ecr.aws/aws-controllers-k8s/s3-chart
  ref:
    tag: "1.7.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ack-s3-controller
  namespace: ack-system
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: ack-s3-chart
  install:
    crds: CreateReplace
    createNamespace: false
  upgrade:
    crds: CreateReplace
  values:
    aws:
      # Injected per-cluster by Flux postBuild substitution (cluster-vars CM)
      region: "${AWS_REGION}"
    serviceAccount:
      create: true
      # Must match the PodIdentityAssociation created by the management
      # cluster (capi-mgmt/infrastructure/ack-pod-identity/).
      name: ack-s3-controller
---
