---
# ══════════════════════════════════════════════════════════════════════════════
# Flux Kustomization: ACK (AWS Controllers for Kubernetes) S3 operator.
#
# Reconciled by the Flux instance running ON each workload cluster (installed
# via HelmChartProxy + ClusterResourceSet from the management cluster).
#
# wait: true ensures the HelmRelease (and therefore the controller Deployment
# and Bucket CRD) is fully Ready before dependents (s3-buckets) are applied.
#
# Region-specific values are injected via the `cluster-vars` ConfigMap, which
# the management cluster delivers to flux-system through a ClusterResourceSet.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aws-operators
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/base/aws-operators
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
