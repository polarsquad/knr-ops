---
# ══════════════════════════════════════════════════════════════════════════════
# Smallest-footprint PostgreSQL instance, reconciled by the ACK RDS controller
# running on this workload cluster. The controller's region is ${AWS_REGION}
# (cluster-vars ConfigMap), so each cluster gets a DB in its own region.
#
# Networking: no dbSubnetGroupName — the instance lands in the region's
# DEFAULT VPC. CAPA creates the EKS VPC dynamically, so its subnet IDs cannot
# be declared in Git ahead of time (known limitation, see
# docs/workload-resources.md).
#
# Master password: manageMasterUserPassword — RDS generates the password and
# stores it in Secrets Manager (secret name prefix "rds!"). Workload clusters
# have no SOPS key, so an in-Git password secret is not an option.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBInstance
metadata:
  name: db
  namespace: default
spec:
  dbInstanceIdentifier: knr-ops-${CLUSTER_NAME}-db
  engine: postgres
  engineVersion: "17"
  # Smallest current-generation instance class (2 vCPU Graviton, 1 GiB RAM)
  dbInstanceClass: db.t4g.micro
  # 20 GiB is the gp3 minimum for RDS PostgreSQL
  allocatedStorage: 20
  storageType: gp3
  masterUsername: postgres
  manageMasterUserPassword: true
  multiAZ: false
  publiclyAccessible: false
  storageEncrypted: true
  tags:
    - key: managed-by
      value: flux-ack
    - key: cluster
      value: ${CLUSTER_NAME}
