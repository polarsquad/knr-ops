---
# ══════════════════════════════════════════════════════════════════════════════
# Flux Kustomization: RDS instances managed by the ACK RDS operator.
#
# dependsOn: aws-operators — the DBInstance CRD and the ACK RDS controller
# must be Ready (aws-operators has wait: true) before DBInstance CRs are
# applied.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rds-instances
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/base/rds-instances
  dependsOn:
    - name: aws-operators
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
