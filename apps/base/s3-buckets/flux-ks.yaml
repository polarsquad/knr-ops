---
# ══════════════════════════════════════════════════════════════════════════════
# Flux Kustomization: S3 buckets managed by the ACK S3 operator.
#
# dependsOn: aws-operators — the Bucket CRD and the ACK S3 controller must be
# Ready (aws-operators has wait: true) before Bucket CRs are applied.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: s3-buckets
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/base/s3-buckets
  dependsOn:
    - name: aws-operators
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
