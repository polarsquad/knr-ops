---
# ══════════════════════════════════════════════════════════════════════════════
# Secure-by-default S3 bucket, reconciled by the ACK S3 controller running on
# this workload cluster.
#
# S3 bucket names are globally unique, so the account ID and cluster name are
# substituted in (cluster-vars ConfigMap) to keep each cluster's bucket unique.
#
# Security posture:
#   - All public access blocked
#   - Server-side encryption enforced (SSE-S3 / AES256, bucket keys enabled)
#   - Versioning enabled
#   - ACLs disabled (BucketOwnerEnforced)
#   - Bucket policy denies any request not using TLS
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: s3.services.k8s.aws/v1alpha1
kind: Bucket
metadata:
  name: data
  namespace: default
spec:
  name: knr-ops-${AWS_ACCOUNT_ID}-${CLUSTER_NAME}-data
  createBucketConfiguration:
    locationConstraint: ${AWS_REGION}
  publicAccessBlock:
    blockPublicACLs: true
    blockPublicPolicy: true
    ignorePublicACLs: true
    restrictPublicBuckets: true
  encryption:
    rules:
      - applyServerSideEncryptionByDefault:
          sseAlgorithm: AES256
        bucketKeyEnabled: true
  versioning:
    status: Enabled
  ownershipControls:
    rules:
      - objectOwnership: BucketOwnerEnforced
  policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Sid": "DenyInsecureTransport",
          "Effect": "Deny",
          "Principal": "*",
          "Action": "s3:*",
          "Resource": [
            "arn:aws:s3:::knr-ops-${AWS_ACCOUNT_ID}-${CLUSTER_NAME}-data",
            "arn:aws:s3:::knr-ops-${AWS_ACCOUNT_ID}-${CLUSTER_NAME}-data/*"
          ],
          "Condition": {
            "Bool": { "aws:SecureTransport": "false" }
          }
        }
      ]
    }
  tagging:
    tagSet:
      - key: managed-by
        value: flux-ack
      - key: cluster
        value: ${CLUSTER_NAME}
