---
# ── Infrastructure: cert-manager → capi-operator → capi-providers ────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/infrastructure
---
# ── Addons + Clusters: delivered together once infrastructure is healthy ───────
# Depends on infrastructure so that CAPI and CAAPH CRDs are present before
# the HelmChartProxy, ClusterResourceSet, and Cluster manifests are applied.
# The clusters Kustomization CR lives inside capi-mgmt/addons so it is only
# created after this dependsOn gate is satisfied — preventing the Cluster
# dry-run from running before cluster.x-k8s.io CRDs exist.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: addons
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/addons
  dependsOn:
    - name: infrastructure
