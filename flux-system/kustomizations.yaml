---
# ── Infrastructure: cert-manager → capi-operator → capi-providers ────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/infrastructure
---
# ── Addons: HelmChartProxy + ClusterResourceSet for workload clusters ─────────
# Depends on infrastructure so that CAPI and CAAPH CRDs are present before
# the HelmChartProxy and ClusterResourceSet manifests are applied.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: addons
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/addons
  dependsOn:
    - name: infrastructure
