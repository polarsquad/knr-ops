---
# ── Infrastructure: cert-manager → capi-operator → capi-providers ────────────
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/infrastructure
---
# ── Addons: HelmChartProxy + ClusterResourceSet for workload clusters ─────────
# Depends on infrastructure so CAAPH CRDs exist before these resources apply.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: addons
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/addons
  dependsOn:
    - name: infrastructure
---
# ── Clusters: EKS Cluster + MachinePool manifests ────────────────────────────
# Depends on infrastructure so the cluster.x-k8s.io CRDs are present,
# and on addons so the HelmChartProxy + ClusterResourceSet are ready to
# act on any new Cluster resource the moment it is created.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusters
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/clusters
  dependsOn:
    - name: infrastructure
    - name: addons
