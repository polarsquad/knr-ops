apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capi-operator
  namespace: flux-system
spec:
  interval: 1h
  releaseName: capi-operator
  targetNamespace: capi-operator-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  dependsOn:
    - name: cert-manager
  chart:
    spec:
      chart: cluster-api-operator
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: capi-operator
        namespace: flux-system
      interval: 12h
  values:
    # Pass-through of core provider installation is handled by capi-providers.yaml
    cert-manager:
      enabled: false
