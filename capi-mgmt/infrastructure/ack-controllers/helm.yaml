---
# ══════════════════════════════════════════════════════════════════════════════
# ACK IAM + EKS controllers on the MANAGEMENT cluster.
#
# Purpose: declaratively create the IAM role and the EKS PodIdentityAssociations
# that let the ACK S3 controllers on the WORKLOAD clusters authenticate via
# EKS Pod Identity — no static AWS credentials ever land on workload clusters.
#
# These management-side controllers authenticate with the same SOPS-encrypted
# credential pattern used by capa-system (aws-credentials.sops.yaml).
#
# The kind management cluster runs on kind (not EKS), so IRSA/Pod Identity is
# not available here; static credentials via SOPS is the established pattern.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ack-iam-chart
  namespace: ack-system
spec:
  interval: 1h
  url: oci://public.ecr.aws/aws-controllers-k8s/iam-chart
  ref:
    tag: "1.7.2"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ack-eks-chart
  namespace: ack-system
spec:
  interval: 1h
  url: oci://public.ecr.aws/aws-controllers-k8s/eks-chart
  ref:
    tag: "1.16.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ack-iam-controller
  namespace: ack-system
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: ack-iam-chart
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    aws:
      # IAM is a global service; region only selects the API endpoint.
      region: eu-north-1
      credentials:
        secretName: aws-credentials
        secretKey: credentials
        profile: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ack-eks-controller
  namespace: ack-system
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: ack-eks-chart
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    aws:
      # Default region; eu-west-1 resources override it with the
      # services.k8s.aws/region annotation on the CR.
      region: eu-north-1
      credentials:
        secretName: aws-credentials
        secretKey: credentials
        profile: default
