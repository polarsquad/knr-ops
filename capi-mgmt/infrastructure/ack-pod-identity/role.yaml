---
# ══════════════════════════════════════════════════════════════════════════════
# IAM role assumed by the ACK S3 controllers on the workload clusters via
# EKS Pod Identity (reconciled by the ACK IAM controller on this cluster).
#
# The trust policy for Pod Identity is static (pods.eks.amazonaws.com) — unlike
# IRSA it does not embed a per-cluster OIDC provider ID, which is what makes
# this approach fully declarable in Git ahead of cluster creation.
#
# Permissions are scoped to bucket-level management of knr-ops-* buckets only.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: ack-s3-controller
  namespace: ack-system
spec:
  name: knr-ops-ack-s3-controller
  description: "ACK S3 controller on knr-ops workload clusters (EKS Pod Identity)"
  assumeRolePolicyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": { "Service": "pods.eks.amazonaws.com" },
          "Action": ["sts:AssumeRole", "sts:TagSession"]
        }
      ]
    }
  inlinePolicies:
    s3-bucket-management: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "ListBuckets",
            "Effect": "Allow",
            "Action": ["s3:ListAllMyBuckets", "s3:GetBucketLocation"],
            "Resource": "*"
          },
          {
            "Sid": "ManageKrmOpsBuckets",
            "Effect": "Allow",
            "Action": [
              "s3:CreateBucket",
              "s3:DeleteBucket",
              "s3:GetBucket*",
              "s3:PutBucket*",
              "s3:DeleteBucketPolicy",
              "s3:GetEncryptionConfiguration",
              "s3:PutEncryptionConfiguration",
              "s3:GetLifecycleConfiguration",
              "s3:PutLifecycleConfiguration",
              "s3:GetReplicationConfiguration",
              "s3:PutReplicationConfiguration",
              "s3:GetAccelerateConfiguration",
              "s3:PutAccelerateConfiguration",
              "s3:GetAnalyticsConfiguration",
              "s3:PutAnalyticsConfiguration",
              "s3:GetInventoryConfiguration",
              "s3:PutInventoryConfiguration",
              "s3:GetMetricsConfiguration",
              "s3:PutMetricsConfiguration",
              "s3:GetIntelligentTieringConfiguration",
              "s3:PutIntelligentTieringConfiguration",
              "s3:ListBucket"
            ],
            "Resource": "arn:aws:s3:::knr-ops-*"
          }
        ]
      }
  tags:
    - key: managed-by
      value: flux-ack
