---
# ══════════════════════════════════════════════════════════════════════════════
# EKS Pod Identity associations: bind each ACK controller ServiceAccount on
# each workload cluster to its knr-ops-ack-* IAM role (S3, RDS, and IAM).
#
# Reconciled by the ACK EKS controller on this (management) cluster. The
# association can only be created once the EKS cluster exists — ACK retries
# until CAPA has provisioned it, so ordering is eventually consistent.
#
# clusterName is the real EKS cluster name created by CAPA:
#   default_<kustomize-prefixed cluster name>-control-plane
#
# The EKS controller's default region is eu-north-1; the eu-west-1 association
# overrides it with the services.k8s.aws/region annotation.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: ack-s3-eu-north-1
  namespace: ack-system
spec:
  clusterName: default_eu-north-1-workload-control-plane
  namespace: ack-system
  serviceAccount: ack-s3-controller
  roleRef:
    from:
      name: ack-s3-controller
      namespace: ack-system
---
apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: ack-s3-eu-west-1
  namespace: ack-system
  annotations:
    services.k8s.aws/region: eu-west-1
spec:
  clusterName: default_eu-west-1-workload-control-plane
  namespace: ack-system
  serviceAccount: ack-s3-controller
  roleRef:
    from:
      name: ack-s3-controller
      namespace: ack-system
---
apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: ack-rds-eu-north-1
  namespace: ack-system
spec:
  clusterName: default_eu-north-1-workload-control-plane
  namespace: ack-system
  serviceAccount: ack-rds-controller
  roleRef:
    from:
      name: ack-rds-controller
      namespace: ack-system
---
apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: ack-rds-eu-west-1
  namespace: ack-system
  annotations:
    services.k8s.aws/region: eu-west-1
spec:
  clusterName: default_eu-west-1-workload-control-plane
  namespace: ack-system
  serviceAccount: ack-rds-controller
  roleRef:
    from:
      name: ack-rds-controller
      namespace: ack-system
---
apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: ack-iam-eu-north-1
  namespace: ack-system
spec:
  clusterName: default_eu-north-1-workload-control-plane
  namespace: ack-system
  serviceAccount: ack-iam-controller
  roleRef:
    from:
      name: ack-iam-controller
      namespace: ack-system
---
apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: ack-iam-eu-west-1
  namespace: ack-system
  annotations:
    services.k8s.aws/region: eu-west-1
spec:
  clusterName: default_eu-west-1-workload-control-plane
  namespace: ack-system
  serviceAccount: ack-iam-controller
  roleRef:
    from:
      name: ack-iam-controller
      namespace: ack-system
