---
# ══════════════════════════════════════════════════════════════════════════════
# IAM role assumed by the ACK RDS controllers on the workload clusters via
# EKS Pod Identity (reconciled by the ACK IAM controller on this cluster).
#
# Same static pods.eks.amazonaws.com trust policy as the S3 role (role.yaml),
# fully declarable in Git ahead of cluster creation.
#
# Permissions are scoped to management of knr-ops-* RDS resources, with three
# additions required by the DBInstance spec we deploy:
#   - secretsmanager on secret:rds!* — manageMasterUserPassword makes RDS
#     create and rotate the master password secret on the caller's behalf
#   - kms:DescribeKey + grant management — storageEncrypted (default aws/rds
#     key) and manageMasterUserPassword (default aws/secretsmanager key)
#     require the CALLER to create KMS grants for RDS; without these,
#     CreateDBInstance fails with "KMSKeyNotAccessibleFault: The specified
#     KMS key [null]...". Grants are restricted to AWS-service resources.
#   - iam:CreateServiceLinkedRole for rds.amazonaws.com — the very first RDS
#     instance in an account/region needs the AWSServiceRoleForRDS
#     service-linked role to exist; scoped so it can create only that one
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: ack-rds-controller
  namespace: ack-system
spec:
  name: knr-ops-ack-rds-controller
  description: "ACK RDS controller on knr-ops workload clusters (EKS Pod Identity)"
  assumeRolePolicyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": { "Service": "pods.eks.amazonaws.com" },
          "Action": ["sts:AssumeRole", "sts:TagSession"]
        }
      ]
    }
  inlinePolicies:
    rds-instance-management: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "DescribeRDS",
            "Effect": "Allow",
            "Action": ["rds:Describe*", "rds:ListTagsForResource"],
            "Resource": "*"
          },
          {
            "Sid": "ManageKnrOpsInstances",
            "Effect": "Allow",
            "Action": [
              "rds:CreateDBInstance",
              "rds:ModifyDBInstance",
              "rds:DeleteDBInstance",
              "rds:RebootDBInstance",
              "rds:StartDBInstance",
              "rds:StopDBInstance",
              "rds:AddTagsToResource",
              "rds:RemoveTagsFromResource"
            ],
            "Resource": "arn:aws:rds:*:*:*:knr-ops-*"
          },
          {
            "Sid": "ManagedMasterPasswordSecrets",
            "Effect": "Allow",
            "Action": [
              "secretsmanager:CreateSecret",
              "secretsmanager:TagResource",
              "secretsmanager:RotateSecret"
            ],
            "Resource": "arn:aws:secretsmanager:*:*:secret:rds!*"
          },
          {
            "Sid": "DescribeDefaultKMSKeys",
            "Effect": "Allow",
            "Action": "kms:DescribeKey",
            "Resource": "*"
          },
          {
            "Sid": "KMSGrantsForAWSResources",
            "Effect": "Allow",
            "Action": [
              "kms:CreateGrant",
              "kms:ListGrants",
              "kms:RevokeGrant"
            ],
            "Resource": "*",
            "Condition": {
              "Bool": { "kms:GrantIsForAWSResource": "true" }
            }
          },
          {
            "Sid": "RDSServiceLinkedRole",
            "Effect": "Allow",
            "Action": "iam:CreateServiceLinkedRole",
            "Resource": "arn:aws:iam::*:role/aws-service-role/rds.amazonaws.com/AWSServiceRoleForRDS",
            "Condition": {
              "StringLike": { "iam:AWSServiceName": "rds.amazonaws.com" }
            }
          }
        ]
      }
  tags:
    - key: managed-by
      value: flux-ack
