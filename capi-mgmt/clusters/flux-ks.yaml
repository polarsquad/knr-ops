apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: eu-north-1
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 20m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/clusters/eu-north-1
  dependsOn:
    - name: capa-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: eu-west-1
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 20m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/clusters/eu-west-1
  dependsOn:
    - name: capa-system