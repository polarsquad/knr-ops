apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/cluster.yaml
patches:
  - target:
      kind: AWSManagedControlPlane
      name: workload-1-control-plane
    patch: |-
      - op: replace
        path: /spec/region
        value: eu-west-1
  - target:
      kind: AWSManagedMachinePool
      name: workload-1-arm
    patch: |-
      - op: replace
        path: /spec/availabilityZones
        value:
          - eu-west-1a
          - eu-west-1b
          - eu-west-1c
