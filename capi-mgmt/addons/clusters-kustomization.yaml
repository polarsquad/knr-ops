---
# ── Clusters: EKS Cluster + MachinePool manifests ────────────────────────────
# Delivered via the addons layer so it is only created after the addons
# Kustomization's dependsOn: infrastructure gate has been satisfied — ensuring
# cluster.x-k8s.io CRDs exist before the Cluster dry-run runs, and that the
# HelmChartProxy + ClusterResourceSet are in place to act on new Clusters
# the moment they are created.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusters
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./capi-mgmt/clusters
  dependsOn:
    - name: addons
