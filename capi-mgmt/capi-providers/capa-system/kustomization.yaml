apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The `aws-credentials` Secret is stored SOPS-encrypted (aws-credentials.sops.yaml)
# and decrypted in-cluster by Flux's kustomize-controller. See README.md.
resources:
  - namespace.yaml
  - providers.yaml
  - aws-credentials.sops.yaml
