---
# ══════════════════════════════════════════════════════════════════════════════
# Namespaces – must exist before the provider CRs are applied so that Flux
# dry-run does not fail with "namespace not found".
# The CAPI Operator would normally create these, but they must be declared
# explicitly here so they are present at apply time.
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-kubeadm-bootstrap-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-kubeadm-control-plane-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capa-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capa-eks-bootstrap-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capa-eks-control-plane-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: caaph-system
---
# ══════════════════════════════════════════════════════════════════════════════
# CAPI Providers – managed by the Cluster API Operator.
# The Operator watches these CRDs and installs/manages the provider controllers.
# ══════════════════════════════════════════════════════════════════════════════

# ── Core Provider ─────────────────────────────────────────────────────────────
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  version: "v1.12.x"
---
# ── Kubeadm Bootstrap Provider ────────────────────────────────────────────────
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: BootstrapProvider
metadata:
  name: kubeadm
  namespace: capi-kubeadm-bootstrap-system
spec:
  version: "v1.12.x"
---
# ── Kubeadm Control Plane Provider ────────────────────────────────────────────
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: kubeadm
  namespace: capi-kubeadm-control-plane-system
spec:
  version: "v1.12.x"
---
# ── AWS Infrastructure Provider (CAPA) ───────────────────────────────────────
# EKS feature gates are required for AWSManagedControlPlane and EKS node pools.
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: aws
  namespace: capa-system
spec:
  version: "v2.10.x"
  configSecret:
    name: aws-credentials
  fetchConfig:
    selector:
      matchLabels:
        provider.cluster.x-k8s.io/name: aws
  additionalManifests: {}
  deployment:
    containers:
      - name: manager
        args:
          "--feature-gates": "EKS=true,EKSEnableIAM=true,EKSAllowAddRoles=true,MachinePool=true"
---
# ── EKS Bootstrap Provider ────────────────────────────────────────────────────
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: BootstrapProvider
metadata:
  name: aws-eks
  namespace: capa-eks-bootstrap-system
spec:
  version: "v2.10.x"
---
# ── EKS Control Plane Provider ───────────────────────────────────────────────
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: aws-eks
  namespace: capa-eks-control-plane-system
spec:
  version: "v2.10.x"
---
# ── CAAPH – Helm Add-on Provider ─────────────────────────────────────────────
# Enables HelmChartProxy and ClusterResourceSet resources used in addons/.
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: AddonProvider
metadata:
  name: helm
  namespace: caaph-system
spec:
  version: "v0.2.x"
